name: Feature Request
description: Propose a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Which component does this affect?
      options:
        - vigia-amazon (AWS backend)
        - vigia-raspi (Edge node)
        - vigia-android (Mobile app)
        - RoadIntelligence IDE
        - Solana / Web3 layer
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you want
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High — blocks other work
    validations:
      required: true
