name: Bug Report
description: Report a bug in the VIGIA system
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Which component is affected?
      options:
        - vigia-amazon (AWS backend)
        - vigia-raspi (Edge node)
        - vigia-android (Mobile app)
        - RoadIntelligence IDE
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See error"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error logs here. Never paste real API keys or secrets.
    validations:
      required: false
